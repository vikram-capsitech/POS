  /pos/organization/{id}:
    put:
      tags: [🏪 POS — Organization]
      summary: Update organization
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
                contactEmail: { type: string }
                contactPhone: { type: string }
                theme: { type: object }
                modules: { type: object }
                logo: { type: string, format: binary }
      responses:
        "200": { description: Organization updated }
        "404": { description: Not found }
